<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Misc Settings</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      height: 100%;
      background: linear-gradient(-45deg, #0f0f1f, #1a1a2e, #2a0845, #1f2937);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
      color: #ffffff;
      overflow-y: auto;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      padding: 2rem;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      background: linear-gradient(to right, #22c55e, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.8em;
      margin-top: 1.5em;
    }

    label {
      display: block;
      margin-top: 1em;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.5em;
      background: #1f2937;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      margin-top: 0.3em;
    }

    input[type="checkbox"] {
      margin-right: 0.5em;
    }

    button {
      margin-top: 1em;
      background: linear-gradient(to right, #3b82f6, #9333ea);
      border: none;
      color: white;
      padding: 0.7em 1.5em;
      border-radius: 9999px;
      font-size: 1em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #9333ea88;
    }

    hr {
      margin: 2em 0;
      border-color: #444;
    }

    #adsBox {
      display: none;
      padding: 1rem;
      border: 1px dashed #888;
      background-color: #111827;
      border-radius: 10px;
      margin-top: 1rem;
    }

    .centered {
      text-align: center;
      margin-top: 3em;
    }

    .top-left {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 1000;
    }

    a {
      color: #22c55e;
      text-decoration: none;
    }

    /* Toggle Switch Styles */
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
      vertical-align: middle;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #6b7280;
      transition: 0.4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: #ffffff;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #22c55e;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body>
  <!-- Top left "Return to Home" -->
  <div class="top-left">
    <a href="/"><button>← Home</button></a>
  </div>

  <h2>Tab Settings</h2>

  <label for="tabTitle">🧠 Rename Tab:</label>
  <input type="text" id="tabTitle" placeholder="New tab title" autocomplete="off">

  <label for="tabIcon">🔮 Icon URL:</label>
  <input type="text" id="tabIcon" placeholder="https://i.img.com/fav.png" autocomplete="off">

  <button onclick="u7Config.updateTab()">Update</button>

  <hr>

  <h2>Cloaking</h2>
  <button onclick="u7Config.openBlank()">Launch about:blnk</button>

  <hr>

  <h2>Ads Module</h2>
  <label class="switch">
    <input type="checkbox" id="adsToggle" onchange="u7Config.toggleAds()">
    <span class="slider"></span>
  </label>
  <span style="margin-left: 10px;">Disable ads</span>

  <div id="adsBox">
    <p>This box simulates a module container. Insert your scripts or content here.</p>
  </div>

  <div class="centered">
    <a href="/"><button>← Return to Home</button></a>
  </div>

  <script>
    const u7Config = {
      updateTab: function() {
        const title = document.getElementById('tabTitle').value;
        const icon = document.getElementById('tabIcon').value;

        if (title) document.title = title;

        if (icon) {
          let link = document.querySelector("link[rel~='icon']");
          if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            document.head.appendChild(link);
          }
          link.href = icon;
        }
      },

      openBlank: function() {
        const newTab = window.open();
        newTab.document.write('<script>location.replace("' + location.href + '")<\/script>');
        newTab.document.close();
      },

      toggleAds: function() {
        const adsBox = document.getElementById('adsBox');
        adsBox.style.display = document.getElementById('adsToggle').checked ? 'none' : 'block';
      }
    };
  </script>
</body>
</html>
