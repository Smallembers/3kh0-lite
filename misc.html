<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>xPage</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f0f1f, #1a1a2e);
      color: #ffffff;
      padding: 2rem;
      margin: 0;
    }

    h2 {
      background: linear-gradient(to right, #22c55e, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.8em;
      margin-top: 1.5em;
    }

    label {
      display: block;
      margin-top: 1em;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.5em;
      background: #1a1a2e;
      color: white;
      border: 1px solid #333;
      border-radius: 8px;
      margin-top: 0.3em;
    }

    input[type="checkbox"] {
      margin-right: 0.5em;
    }

    button {
      margin-top: 1em;
      background: linear-gradient(to right, #3b82f6, #9333ea);
      border: none;
      color: white;
      padding: 0.7em 1.5em;
      border-radius: 9999px;
      font-size: 1em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #9333ea88;
    }

    hr {
      margin: 2em 0;
      border-color: #444;
    }

    #adz1 {
      display: none;
      padding: 1rem;
      border: 1px dashed #888;
      background-color: #111827;
      border-radius: 10px;
      margin-top: 1rem;
    }

    a {
      color: #22c55e;
    }

    .centered {
      text-align: center;
      margin-top: 3em;
    }
  </style>
</head>
<body>
  <h2>u7 Config Panel</h2>

  <label for="txt1">🧠 Rename Tab:</label>
  <input type="text" id="txt1" placeholder="New tab title" autocomplete="off">

  <label for="ico1">🔮 Icon URL:</label>
  <input type="text" id="ico1" placeholder="https://i.img.com/fav.png" autocomplete="off">

  <button onclick="do1()">Update</button>

  <hr>

  <h2>r3 Cloak</h2>
  <button onclick="openBlnk()">Launch about:blnk</button>

  <hr>

  <h2>v3 Module (ads)</h2>
  <label for="chk1">
    <input type="checkbox" id="chk1" onchange="toggleAdz()"> Disable ads
  </label>

  <div id="adz1">
    <p>This box simulates a module container. Insert your scripts or content here.</p>
  </div>

  <div class="centered">
    <a href="/"><button>← Return to Home</button></a>
  </div>

  <script>
    function do1() {
      const t = document.getElementById('txt1').value;
      const i = document.getElementById('ico1').value;

      if (t) document.title = t;

      if (i) {
        let l = document.querySelector("link[rel~='icon']");
        if (!l) {
          l = document.createElement('link');
          l.rel = 'icon';
          document.head.appendChild(l);
        }
        l.href = i;
      }
    }

    function openBlnk() {
      const x = window.open();
      x.document.write('<script>location.replace("'+location.href+'")<\/script>');
      x.document.close();
    }

    function toggleAdz() {
      const box = document.getElementById('adz1');
      box.style.display = document.getElementById('chk1').checked ? 'none' : 'block';
    }
  </script>
</body>
</html>
