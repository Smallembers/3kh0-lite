<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Projects | 3kh0</title>
    <meta name="keywords" content="front-end web developer, unblocked, games, google sites, unblocked games mom, ublocked, code, coding, programmer, development, javascript, jquery, bootstrap, sass, less, git" />
    <meta property="og:title" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
    <meta property="og:site_name" content="3kh0.github.io" />
    <meta property="og:description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
    <meta name="description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
    <meta name="author" content="3kh0" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="shortcut-icon" href="/favicon.ico" />
    <script src="/js/main.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
        height: 100%;
        background: linear-gradient(-45deg, #0f0f1f, #1a1a2e, #2a0845, #1f2937);
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
        color: #ffffff;
        overflow-y: auto;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      body {
        padding: 2rem;
        animation: fadeIn 1s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      h1 {
        font-size: 3em;
        text-align: center;
        background: linear-gradient(to right, #22c55e, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-top: 1.5em;
      }

      input[type="text"] {
        width: 100%;
        font-size: 18px;
        padding: 6px 20px;
        margin: auto;
        border-radius: 30px;
        max-width: 600px;
        margin-bottom: 10px;
      }

      button {
        cursor: pointer;
        background-color: #9333ea;
        border: none;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        border-radius: 20px;
        margin-top: 20px;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px #9333ea88;
      }

      .game-link {
        height: 400px;
        width: 300px;
        text-decoration: none;
      }

      .game-tile {
        background-color: #949494;
        height: 400px;
        width: 300px;
        border-radius: 30px;
      }

      .game-icon {
        border-radius: 30px;
        width: 300px;
        height: 300px;
      }

      .game-title {
        font-size: 30px;
        font-weight: bold;
        color: #000000;
        text-align: center;
        margin: auto;
      }

      .flex-container {
        display: flex;
        flex-direction: row;
        order: 0;
        flex-grow: 0;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
      }

      .container {
        padding: 10px;
      }

      .top-left {
        position: fixed;
        top: 1rem;
        left: 1rem;
        z-index: 1000;
      }

      a {
        color: #22c55e;
        text-decoration: none;
      }

      #loader {
        display: block;
        border: 16px solid #f3f3f3;
        border-top: 16px solid #3498db;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        animation: spin 0.3s linear infinite;
        margin: auto;
        margin-top: 1rem;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      #back-to-top {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(to right, #9333ea, #22c55e);
        padding: 10px 20px;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      #back-to-top:hover {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div class="top-left">
      <a href="/"><button>← Home</button></a>
    </div>

    <h1>Projects</h1>
    <input type="text" id="search" onkeyup="searchGames()" placeholder="Search for games..." />
    <div id="loader"></div>
    <div id="game-container" class="flex-container"></div>
    <p class="text-center">
      <a href="/index.html">
        <button>Go to the homepage</button>
      </a>
    </p>

    <button id="back-to-top">Back to top</button>

    <script>
      let games = [];
      fetch("config/games.json")
        .then((response) => response.json())
        .then((data) => {
          games = data;
          const container = document.getElementById("game-container");
          data.forEach((project) => {
            const game = document.createElement("a");
            game.href = project.link;
            game.className = "game-link container";
            game.innerHTML = `
            <div class="game-tile">
              <img class="game-icon" src="${project.imgSrc}" alt="icon" />
              <p class="game-title">${project.title}</p>
            </div>`;
            container.appendChild(game);
          });
          document.getElementById("loader").style.display = "none";
        })
        .catch((error) => console.error("Error:", error));

      function searchGames() {
        const input = document.getElementById("search");
        const filter = input.value.toUpperCase();
        const container = document.getElementById("game-container");
        container.innerHTML = "";
        games
          .filter((game) => game.title.toUpperCase().includes(filter))
          .forEach((project) => {
            const game = document.createElement("a");
            game.href = project.link;
            game.className = "game-link container";
            game.innerHTML = `
            <div class="game-tile">
              <img class="game-icon" src="${project.imgSrc}" alt="icon" loading="lazy" />
              <p class="game-title">${project.title}</p>
            </div>`;
            container.appendChild(game);
          });
      }

      const backToTopButton = document.getElementById('back-to-top');
      window.onscroll = function () {
        if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
          backToTopButton.style.display = "block";
        } else {
          backToTopButton.style.display = "none";
        }
      };

      backToTopButton.onclick = function () {
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
      };
    </script>
  </body>
</html>
