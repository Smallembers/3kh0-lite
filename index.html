<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3kh0 lite</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
  <meta property="og:title" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
  <meta property="og:site_name" content="3kh0.github.io" />
  <meta property="og:description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: #05050d;
      color: #e0e0ff;
      overflow: hidden;
    }

    canvas#bg {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1rem;
    }

    h1 {
      font-size: 3.5rem;
      background: linear-gradient(to right, #00f2ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3em;
      animation: fadeInDown 0.8s ease-out;
    }

    #subtitle {
      font-size: 1.3rem;
      color: #aaa;
      font-style: italic;
      margin-bottom: 1.5rem;
      animation: fadeInUp 1s ease-out;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.05);
      max-width: 700px;
      width: 90%;
      animation: fadeIn 1.5s ease;
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, #0fffc1, #3b82f6);
      border: none;
      color: white;
      padding: 14px 32px;
      font-size: 1rem;
      border-radius: 9999px;
      margin: 10px;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    button:hover {
      transform: scale(1.06);
      box-shadow: 0 0 18px #0fffc177;
    }

    .alt-btn {
      background: linear-gradient(135deg, #c084fc, #9333ea);
    }

    a {
      text-decoration: none;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #888;
      max-width: 600px;
    }

    footer a {
      color: #0fffc1;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <h1>3kh0 lite</h1>
  <span id="subtitle">Fast. Lightweight. Clean.</span>

  <div class="card">
    <p>Welcome to <strong>3kh0 lite</strong>, a lightweight, lightning fast, and clean gxme site.</p>
    <a href="/projects.html"><button>Start playing!</button></a>
    <a href="/misc.html"><button class="alt-btn">Tools & Settings</button></a>
  </div>

  <footer>
    &copy; 3kh0, 2024. Use and/or duplicate content from the <a href="https://github.com/3kh0/3kh0-lite">GitHub repo</a> with proper credit.<br>
    Contact Echo at <a href="mailto:echo-the-coder@tuta.io">echo-the-coder@tuta.io</a>.
  </footer>

  <script>
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    let width, height;
    let particles = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.7;
        this.vy = (Math.random() - 0.5) * 0.7;
        this.size = Math.random() * 2 + 1;
        this.alpha = Math.random() * 0.5 + 0.3;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
          this.reset();
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(173, 216, 230, ${this.alpha})`;
        ctx.fill();
      }
    }

    function initParticles(count) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      for (const p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animate);
    }

    initParticles(120);
    animate();
  </script>

  <script src="/js/main.js"></script>
  <script src="/js/subtitle.js"></script>
</body>
</html>
