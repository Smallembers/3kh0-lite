<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3kh0 lite</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="keywords" content="front-end web developer, unblocked, games, coding, javascript, git" />
  <meta name="description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
  <meta name="author" content="3kh0" />
  <meta property="og:title" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
  <meta property="og:site_name" content="3kh0.github.io" />
  <meta property="og:description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(145deg, #0e0e0e, #1a1a1a);
      color: #f0f0f0;
      font-family: "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      font-size: 4rem;
      background: linear-gradient(to right, #22c55e, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInDown 1s ease-out;
      margin-bottom: 0.2em;
    }

    #subtitle {
      font-size: 1.5rem;
      color: #aaa;
      animation: fadeInUp 1.5s ease-out;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      margin-top: 2rem;
      max-width: 700px;
      width: 90%;
      animation: fadeIn 2s ease;
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      border: none;
      color: white;
      padding: 14px 28px;
      font-size: 1rem;
      border-radius: 30px;
      margin: 10px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px #22c55e88;
    }

    .alt-btn {
      background: linear-gradient(135deg, #8b5cf6, #c084fc);
    }

    a {
      color: #22c55e;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #888;
      max-width: 600px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h1>3kh0 lite</h1>
  <span id="subtitle">Fast. Lightweight. Clean.</span>

  <div class="card">
    <p>Welcome to <strong>3kh0 lite</strong>, a lightweight, lightning fast, and clean gxme site.</p>
    <a href="/projects.html"><button>Start playing!</button></a>
    <a href="/misc.html"><button class="alt-btn">Tools & Settings</button></a>
  </div>

  <footer>
    &copy; 3kh0, 2024. Use and/or duplicate content from the <a href="https://github.com/3kh0/3kh0-lite">GitHub repo</a> with proper credit.<br>
    Contact Echo at <a href="mailto:echo-the-coder@tuta.io">echo-the-coder@tuta.io</a>.
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/subtitle.js"></script>
</body>
</html>
