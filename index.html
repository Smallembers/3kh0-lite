<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3kh0 lite</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
  <meta property="og:title" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />
  <meta property="og:site_name" content="3kh0.github.io" />
  <meta property="og:description" content="Welcome to 3kh0 lite, a lightweight, fast, and clean game site." />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse at center, #0f0f1b 0%, #05050d 100%);
      color: #e0e0ff;
      font-family: "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      font-size: 3.5rem;
      background: linear-gradient(to right, #00f2ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3em;
      animation: fadeInDown 0.8s ease-out;
    }

    #subtitle {
      font-size: 1.3rem;
      color: #aaa;
      font-style: italic;
      margin-bottom: 1.5rem;
      animation: fadeInUp 1s ease-out;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.05);
      max-width: 700px;
      width: 90%;
      animation: fadeIn 1.5s ease;
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, #0fffc1, #3b82f6);
      border: none;
      color: white;
      padding: 14px 32px;
      font-size: 1rem;
      border-radius: 9999px;
      margin: 10px;
      position: relative;
      z-index: 1;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    button:hover {
      transform: scale(1.06);
      box-shadow: 0 0 18px #0fffc177;
    }

    .alt-btn {
      background: linear-gradient(135deg, #c084fc, #9333ea);
    }

    a {
      text-decoration: none;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #888;
      max-width: 600px;
    }

    footer a {
      color: #0fffc1;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h1>3kh0 lite</h1>
  <span id="subtitle">Fast. Lightweight. Clean.</span>

  <div class="card">
    <p>Welcome to <strong>3kh0 lite</strong>, a lightweight, lightning fast, and clean gxme site.</p>
    <a href="/projects.html"><button>Start playing!</button></a>
    <a href="/misc.html"><button class="alt-btn">Tools & Settings</button></a>
  </div>

  <footer>
    &copy; 3kh0, 2024. Use and/or duplicate content from the <a href="https://github.com/3kh0/3kh0-lite">GitHub repo</a> with proper credit.<br>
    Contact Echo at <a href="mailto:echo-the-coder@tuta.io">echo-the-coder@tuta.io</a>.
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/subtitle.js"></script>
</body>
</html>
